# Builds the Docker image and publishes it to GitHub Container Registry so the
# README's one-liner install works:
#   docker run -p 8000:8000 -e ANTHROPIC_API_KEY=sk-... ghcr.io/keeganburkart/nc-benefits-navigator
name: publish-image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/keeganburkart/nc-benefits-navigator:latest
            ghcr.io/keeganburkart/nc-benefits-navigator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
