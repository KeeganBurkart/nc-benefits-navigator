name: disabled-adult-uncapped-shelter
description: "Disabled Wilmington adult on SSDI with very high rent; because the household has a disabled member the excess shelter deduction is uncapped."
verified: false
household:
  members:
    - {id: m1, age: 40, relationship: self, is_pregnant: false, is_disabled: true, immigration_status: citizen, is_student: false}
  income:
    - {id: i1, member_id: m1, kind: ssdi, amount_cents: 120000, frequency: monthly}
  expenses:
    rent_or_mortgage_cents: 150000
    utilities_included: false
    pays_heating_cooling: true
    dependent_care_cents: 0
    child_support_paid_cents: 0
    medical_expenses_elderly_disabled_cents: 0
  county: New Hanover
  purchases_and_prepares_together: true
# FNS (size 1, has disabled member -> gross test skipped, shelter deduction UNCAPPED):
#   gross = 120000 (SSDI unearned -> no earned deduction).
#   deductions: standard(1-2) 20900
#     shelter: rent 150000 + SUA(1) 63700 = 213700; income_after_other = 120000 - 20900 = 99100; half = 49550
#       excess = 213700 - 49550 = 164150 -> NOT capped (disabled member) -> full 164150 applied.
#       (A non-elderly/non-disabled household would cap this at 74400; the uncapped path is the point of this fixture.)
#     total = 20900 + 164150 = 185050
#   net = max(120000 - 185050, 0) = 0; net limit (size 1) = 130500 -> passes.
#   allotment = max(1) 29800 - round_half_up(0.3 * 0 = 0) = 29800 (full maximum allotment).
# Medicaid (size 1, countable SSDI 120000; SSDI IS countable):
#   adult expansion limit (138%+5%, size1) = 190190; 120000 <= 190190 -> adult qualifies -> likely_eligible.
expected:
  fns: {status: likely_eligible, estimated_benefit_cents: 29800}
  medicaid: {status: likely_eligible}
