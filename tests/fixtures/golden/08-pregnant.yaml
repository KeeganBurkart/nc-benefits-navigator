name: pregnant-adult-medicaid-for-pregnant-women
description: "Pregnant Wilmington adult working full time; qualifies for Medicaid for Pregnant Women and a modest food benefit."
verified: true  # 2026-07-03: tables verified against primary sources (2026 HHS FPL detailed guidelines, USDA FY26 SNAP COLA memo, NC FNS-360 rev 2025-09-30, NC MA-3321 rev 2026-04-01, 7 CFR 246.7, 47 CFR 54.403/54.409) and arithmetic independently recomputed & corrected to whole-dollar allotments -- verification by Claude (AI) with primary sources, not a human reviewer
household:
  members:
    - {id: m1, age: 27, relationship: self, is_pregnant: true, is_disabled: false, immigration_status: citizen, is_student: false}
  income:
    - {id: i1, member_id: m1, kind: wages, amount_cents: 160000, frequency: monthly}
  expenses:
    rent_or_mortgage_cents: 95000
    utilities_included: false
    pays_heating_cooling: true
    dependent_care_cents: 0
    child_support_paid_cents: 0
    medical_expenses_elderly_disabled_cents: 0
  county: New Hanover
  purchases_and_prepares_together: true
# FNS (size 1, earned; pregnancy does NOT exempt the shelter cap -- only elderly/disabled does):
#   gross = 160000; gross 200% limit (size 1) = 266000 -> passes.
#   deductions: standard(1-2) 20900 + earned 20% of 160000 = 32000
#     shelter: rent 95000 + SUA(1) 63700 = 158700; income_after_other = 160000 - 52900 = 107100; half = 53550
#       excess = 158700 - 53550 = 105150 -> capped at 74400 = 74400
#     total = 20900 + 32000 + 74400 = 127300
#   net = 160000 - 127300 = 32700; net limit (size 1) = 130500 -> passes.
#   allotment = max(1) 29800 - 0.3*32700 (=9810) = 19990 -> round down to whole dollar (FNS-360 step 28) = 19900.
# Medicaid (size 1, countable wages 160000):
#   Pregnant Women limit (196%+5%, size1) = 267330; 160000 <= 267330 -> pregnant adult eligible -> likely_eligible.
# WIC: categorical via pregnancy. Size counts the unborn child: 1 member + 1 pregnancy = 2.
#   185% FPL(2) = round_half_up(180333 * 1.85 = 333616.05) = 333616; 160000 <= 333616 -> likely_eligible.
# Lifeline: household size 1 (unborn not counted); 135% FPL(1) = 179550;
#   160000 <= 179550 -> likely_eligible via income, $9.25/mo discount.
expected:
  fns: {status: likely_eligible, estimated_benefit_cents: 19900}
  medicaid: {status: likely_eligible}
  wic: {status: likely_eligible}
  lifeline: {status: likely_eligible, estimated_benefit_cents: 925}
