name: minimum-allotment-single-adult
description: "Single Wilmington adult whose computed food benefit rounds below the floor, so the $24 minimum allotment for 1-2 person households applies."
verified: false
household:
  members:
    - {id: m1, age: 55, relationship: self, is_pregnant: false, is_disabled: false, immigration_status: citizen, is_student: false}
  income:
    - {id: i1, member_id: m1, kind: social_security, amount_cents: 115000, frequency: monthly}
  expenses:
    rent_or_mortgage_cents: 0
    utilities_included: false
    pays_heating_cooling: false
    dependent_care_cents: 0
    child_support_paid_cents: 0
    medical_expenses_elderly_disabled_cents: 0
  county: New Hanover
  purchases_and_prepares_together: true
# FNS (size 1; Social Security is unearned -> no earned deduction; no shelter):
#   gross = 115000; gross 200% limit (size 1) = 266000 -> passes.
#   deductions: standard(1-2) 20900 only.
#   net = 115000 - 20900 = 94100; net limit (size 1) = 130500 -> passes.
#   raw allotment = max(1) 29800 - round_half_up(0.3 * 94100 = 28230) = 1570.
#   1570 > 0 and below the 2400 minimum (1-2 person households) -> bumped to minimum_allotment 2400.
# Medicaid (size 1, countable Social Security 115000):
#   adult expansion limit (133%+5%, size1) = 183540; 115000 <= 183540 -> adult eligible -> likely_eligible.
expected:
  fns: {status: likely_eligible, estimated_benefit_cents: 2400}
  medicaid: {status: likely_eligible}
