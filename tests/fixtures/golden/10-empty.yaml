name: empty-household
description: "No members and no income entered yet -- the screen has nothing to evaluate and asks for more information."
verified: true  # 2026-07-03: tables verified against primary sources (2026 HHS FPL detailed guidelines, USDA FY26 SNAP COLA memo, NC FNS-360 rev 2025-09-30, NC MA-3321 rev 2026-04-01, 7 CFR 246.7, 47 CFR 54.403/54.409) and arithmetic independently recomputed & corrected to whole-dollar allotments -- verification by Claude (AI) with primary sources, not a human reviewer
household:
  members: []
  income: []
  expenses: {}
  county: null
  purchases_and_prepares_together: null
# FNS: no members and no income -> short-circuits to needs_more_info (nothing to test).
# Medicaid: no members and no income -> short-circuits to needs_more_info (nothing to test).
# Neither program produces a benefit. missing_fields stay empty because there are no
# member/income rows to report paths against (the engine never raises on the empty input).
expected:
  fns: {status: needs_more_info}
  medicaid: {status: needs_more_info}
